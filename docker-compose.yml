version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fan_platform}
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  backend:
    build: ./backend
    command: npm run start:dev
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: fan_platform
    depends_on: [db, redis]
    ports: ["3000:3000"]
  frontend:
    build: ./frontend
    command: npm run dev
    ports: ["3001:3000"]
    depends_on: [backend]
volumes:
  db_data:
